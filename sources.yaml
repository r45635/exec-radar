source_sets:
  - name: semiconductor_exec_core
    description: >
      High-precision set for executive semiconductor operations, supply chain,
      industrialization, packaging, quality, and hardware program leadership.
    profile_tags:
      - semiconductor
      - executive_operations
      - supply_chain
      - industrialization
      - quality
      - packaging
      - test
    greenhouse_boards:
      samsungsemiconductor:
        display_name: "Samsung Semiconductor"
        priority: high
        focus_tags:
          - semiconductor
          - operations
          - test
          - quality
          - automotive
          - photonics
        noise_risk: medium
        regions:
          - US
        notes: >
          Strong semiconductor board with quality, test, and operations-adjacent
          signals. Broad board, so some software/design noise is expected.
      anellophotonics:
        display_name: "ANELLO Photonics"
        priority: high
