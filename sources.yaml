# Exec Radar — Source Set Definitions
# ====================================
# Each source set groups job boards across ATS platforms (Greenhouse,
# Lever, Ashby).  Reference a set by name in your TargetProfile or via
# the EXEC_RADAR_SOURCE_SET environment variable.
#
# Format:
#   - name: unique_identifier
#     description: "Human-readable description"
#     boards:                         # Greenhouse boards
#       board_token: "Company Name"
#     lever_boards:                   # Lever job boards
#       company_slug: "Company Name"
#     ashby_boards:                   # Ashby job boards
#       company_slug: "Company Name"

# ── Semiconductor executive operations ────────────────────────────
- name: semiconductor_exec
  description: >-
    Semiconductor companies with executive operations, supply-chain,
    and industrialization roles (IDM, fabless, foundry, OSAT).
  boards:
    lattice: "Lattice Semiconductor"
    tenstorrent: "Tenstorrent"
    allegro: "Allegro Microsystems"
    lightmatter: "Lightmatter"
    cerebrassystems: "Cerebras Systems"
    sambanovasystems: "SambaNova Systems"
    luminar: "Luminar Technologies"
    atomicmachines: "Atomic Machines"
    markforged: "Markforged"
    samsara: "Samsara"
    verkada: "Verkada"
    astranis: "Astranis"
  lever_boards:
    rigetti: "Rigetti Computing"
    aeva: "Aeva Technologies"
  ashby_boards:
    ramp: "Ramp"
    cohere: "Cohere"

