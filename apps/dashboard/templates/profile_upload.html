{% extends "base.html" %}

{% block title %}Upload Profile - Exec Radar{% endblock %}

{% block content %}
<div class="profiles-header">
    <h2>Upload YAML Profile</h2>
    <a href="/dashboard/profiles" class="btn btn-secondary">&larr; Back to Profiles</a>
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post" enctype="multipart/form-data" class="profile-form" data-testid="upload-form">
    <fieldset>
        <legend>Upload a YAML file</legend>
        <div class="form-group">
            <label for="name">Profile Name <span class="hint">(optional — defaults to filename)</span></label>
            <input type="text" id="name" name="name" maxlength="256"
                   placeholder="e.g. My Semiconductor Profile" />
        </div>
        <div class="form-group">
            <label for="file">YAML File *</label>
            <input type="file" id="file" name="file" accept=".yaml,.yml" required />
        </div>
    </fieldset>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Upload &amp; Import</button>
        <a href="/dashboard/profiles" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
